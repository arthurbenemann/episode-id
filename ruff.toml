line-length = 100
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501", # line too long (handled by formatter)
]

[lint.per-file-ignores]
"tests/*" = ["B011"]
# Typer's idiomatic pattern is to call typer.Option() in argument defaults.
"app/cli.py" = ["B008"]

[format]
quote-style = "double"
indent-style = "space"
